<body data-role="doctor">
    <div class="container">
        <div class="topbar">
            <h1>Panel lekarza</h1>
            <button onclick="logout()">Wyloguj</button>
        </div>

        <section>
            <h2>Wystaw receptę</h2>
            <input id="patientId" type="number" placeholder="ID pacjenta">
            <input id="medicineId" type="number" placeholder="ID leku">
            <input id="quantity" type="number" placeholder="Ilość">
            <button onclick="createPrescription()">Utwórz receptę</button>
            <div id="createdPrescription"></div>
        </section>
    </div>

    <script src="/js/login.js"></script>
    <script src="/js/doctor.js"></script>
    <script>
        requireRole("doctor");
    </script>
</body>
