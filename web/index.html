<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Logowanie - System Apteczny</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container narrow">
        <h1>System Apteczny</h1>

        <section>
            <h2>Logowanie</h2>
            <input id="email" type="email" placeholder="Email">
            <input id="password" type="password" placeholder="Hasło">
            <button onclick="login()">Zaloguj</button>
            <p id="loginMessage" class="message"></p>
        </section>
        <section>
            <h2>Rejestracja</h2>

            <input id="registerFullName" type="text" placeholder="Imię i nazwisko">
            <input id="registerEmail" type="email" placeholder="Email">
            <input id="registerPassword" type="password" placeholder="Hasło">

            <select id="registerRole">
                <option value="patient">Pacjent</option>
                <option value="employee">Pracownik</option>
                <option value="doctor">Lekarz</option>
            </select>

            <button onclick="register()">Zarejestruj</button>
            <p id="registerMessage" class="message"></p>
        </section>
    </div>

    <script src="/js/login.js"></script>
    <script>
        redirectLoggedUser();
    </script>
</body>
</html>
