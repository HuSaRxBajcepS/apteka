<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel pacjenta - System Apteczny</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body data-role="patient">
    <div class="container">
        <div class="topbar">
            <h1>Panel pacjenta</h1>
            <button class="logout-btn" onclick="logout()">Wyloguj</button>
        </div>

        <section>
            <h2>Moje konto</h2>
            <div id="account">Ładowanie...</div>
        </section>

        <section>
            <h2>Moje recepty</h2>
            <button onclick="loadMyPrescriptions()">Odśwież recepty</button>
            <div id="prescriptions" class="grid"></div>
        </section>
    </div>

    <script src="/js/login.js?v=3"></script>
    <script src="/js/patient.js?v=3"></script>
    <script>
        requireRole("patient");
        loadPatientPanel();
    </script>
</body>
</html>
